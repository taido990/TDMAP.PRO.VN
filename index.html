<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TDMAP – Bản Đồ Thửa Đất</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #map { width: 100%; height: 100%; }

  /* THANH TÌM KIẾM NỔI (MÀU TRẮNG) */
  #searchBar {
    position: fixed;
    top: 15px; left: 15px;
    z-index: 1000;
    display: flex; align-items: center; gap: 8px;
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0, 0, 0, 0.1);
    border-radius: 25px;
    padding: 6px 6px 6px 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    width: 380px;
    max-width: calc(100vw - 30px);
    transition: all 0.3s ease;
  }
  #searchBar .logo { font-size: 13px; font-weight: 800; color: #00c6a7; letter-spacing: 1px; }
  #searchBar .divider { width: 1px; height: 18px; background: rgba(0,0,0,0.1); margin: 0 4px; }
  #searchInput {
    flex: 1; background: transparent; border: none;
    color: #333; font-size: 14px; outline: none; width: 100%;
  }
  #searchInput::placeholder { color: #999; }
  
  /* NÚT TÌM KIẾM (ICON) */
  #searchBtn {
    background: transparent; border: none;
    color: #666; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px;
    transition: color 0.2s;
  }
  #searchBtn:hover { color: #00c6a7; }
  #searchBtn:active { transform: scale(0.9); }

  #loadBtn {
    background: #00c6a7; border: none; border-radius: 18px;
    color: #fff; font-size: 13px; font-weight: 800; text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    padding: 8px 14px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: opacity 0.2s, background 0.2s;
  }
  #loadBtn:active { opacity: 0.8; }
  #fileInput { display: none; }

  /* NÚT VỊ TRÍ */
  #locateBtn {
    width: 36px; height: 36px; border-radius: 50%;
    background: #fff; border: 2px solid rgba(0,0,0,0.1);
    box-shadow: 0 2px 6px rgba(0,0,0,.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer;
    transition: background .2s, transform .15s;
    margin-bottom: 10px;
  }
  #locateBtn:active { transform: scale(.9); }
  #locateBtn.locating { background: #e8f4ff; border-color: #1a6fd4; animation: pulse 1.2s infinite; }
  #locateBtn.located  { background: #e8fff8; border-color: #00c6a7; }
  @keyframes pulse { 0%,100%{box-shadow:0 2px 8px rgba(0,0,0,.3)} 50%{box-shadow:0 0 0 8px rgba(26,111,212,.15)} }

  /* STATUS */
  #statusPill {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 200; background: rgba(10,18,28,0.9);
    border: 1px solid rgba(0,198,167,0.5); border-radius: 20px;
    padding: 7px 18px; font-size: 12px; color: #00c6a7;
    white-space: nowrap; pointer-events: none; transition: opacity .4s;
  }

  /* POPUP BẢN ĐỒ */
  #popup {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
    background: #ffffff;
    border-top: 2.5px solid #00c6a7;
    border-radius: 18px 18px 0 0;
    padding: 10px 14px 20px;
    transform: translateY(110%);
    transition: transform .3s cubic-bezier(.32,0,.2,1);
    box-shadow: 0 -6px 32px rgba(0,0,0,.2);
  }
  #popup.open { transform: translateY(0); }
  #popupHandle {
    width: 32px; height: 3px; background: rgba(0,0,0,0.12);
    border-radius: 2px; margin: 0 auto 14px;
  }
  #popupHeader {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  #popupBrand {
    font-size: 10px; font-weight: 800; color: #00c6a7;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  #popupClose {
    background: rgba(0,0,0,0.07); border: none; border-radius: 50%;
    color: #666; font-size: 13px; width: 24px; height: 24px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  #popupTitle { font-size: 17px; font-weight: 800; color: #111; margin-bottom: 2px; }
  #popupCoords { font-size: 10px; color: #aaa; margin-bottom: 10px; }

  .btn-row { display: flex; gap: 10px; }
  .btn-row a {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 8px; border-radius: 8px;
    font-size: 12px; font-weight: 700; text-decoration: none; color: #fff;
    -webkit-tap-highlight-color: transparent;
    transition: filter .15s, transform .1s;
  }
  .btn-row a:active { filter: brightness(.8); transform: scale(.97); }
  .btn-hsq  { background: linear-gradient(135deg,#1565d8,#0d4fb5); }
  .btn-maps { background: linear-gradient(135deg,#e8430a,#c2320a); }
  .btn-row a .ico { font-size: 13px; }
  .btn-row a.disabled { opacity: .3; pointer-events: none; }

  /* SPLASH */
  #splash {
    position: fixed; inset: 0; z-index: 1000; background: #ffffff;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
  }
  #splash .brand { font-size: 13px; font-weight: 800; color: #00c6a7; letter-spacing: 3px; }
  #splash .circle {
    width: 76px; height: 76px; border-radius: 50%;
    background: rgba(0,198,167,0.12); border: 2px solid #00c6a7;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; cursor: pointer;
    transition: background .2s;
  }
  #splash .circle:active { background: rgba(0,198,167,0.25); }
  #splash h2 { font-size: 17px; font-weight: 700; color: #111; }
  #splash p  { font-size: 13px; color: #555; text-align: center; padding: 0 36px; line-height: 1.7; }

  /* DROP OVERLAY */
  #dropOverlay {
    position: fixed; inset: 0; z-index: 900;
    background: rgba(0,198,167,0.07);
    border: 3px dashed #00c6a7;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0; transition: opacity .2s;
  }
  #dropOverlay.show { opacity: 1; pointer-events: all; }
  #dropOverlay p { font-size: 20px; font-weight: 700; color: #00c6a7; text-align: center; line-height: 1.6; }

  /* HỘP THOẠI CẢNH BÁO TÙY CHỈNH (CUSTOM ALERT) */
  #customAlertOverlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  #customAlertOverlay.show { opacity: 1; pointer-events: all; }
  #customAlertBox {
    background: #fff; width: 90%; max-width: 320px;
    border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transform: scale(0.9); transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    overflow: hidden;
  }
  #customAlertOverlay.show #customAlertBox { transform: scale(1); }
  #customAlertHeader {
    background: #f8f9fa; padding: 14px 18px;
    font-weight: 800; font-size: 14px; color: #00c6a7;
    border-bottom: 1px solid #eaeaea; letter-spacing: 0.5px;
  }
  #customAlertBody {
    padding: 20px 18px; font-size: 14px; color: #444;
    line-height: 1.6; white-space: pre-wrap;
  }
  #customAlertFooter {
    padding: 12px 18px 18px; display: flex; justify-content: flex-end;
  }
  #customAlertBtn {
    background: #1a6fd4; color: #fff; border: none; border-radius: 8px;
    padding: 8px 24px; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: background 0.15s;
  }
  #customAlertBtn:hover { background: #1355a6; }
  #customAlertBtn:active { transform: scale(0.95); }
</style>
</head>
<body>

<div id="splash">
  <div class="brand">TDMAP.PRO.VN</div>
  <div class="circle" onclick="document.getElementById('fileInput').click()">📂</div>
  <h2>Tải file KML lên</h2>
  <p>Chọn file .kml xuất từ QGIS script TDMAP<br>để xem ranh thửa trên ảnh vệ tinh</p>
</div>

<div id="map"></div>

<div id="logoWrap" style="
  position:fixed; top:70px; right:10px; z-index:199;
  background:rgba(10,18,28,0.82); backdrop-filter:blur(8px);
  border:1px solid rgba(0,198,167,0.4); border-radius:8px;
  padding:5px 10px; display:none;
">
  <span style="font-size:11px;font-weight:800;color:#00c6a7;letter-spacing:1.5px;">TDMAP.PRO.VN</span>
</div>

<div id="searchBar">
  <div class="logo">TDMAP</div>
  <div class="divider"></div>
  <input id="searchInput" type="search" placeholder="Nhập Tờ-Thửa (vd: 31-27)..." oninput="onInputSearch()" onkeydown="if(event.key==='Enter') executeSearch()">
  <button id="searchBtn" onclick="executeSearch()" title="Tìm kiếm thửa đất">🔍</button>
  <button id="loadBtn" onclick="document.getElementById('fileInput').click()">📂 Mở KML</button>
</div>
<input type="file" id="fileInput" accept=".kml,.xml" onchange="handleFile(this.files[0])">

<div id="statusPill" style="opacity:0">–</div>

<div id="popup">
  <div id="popupHandle"></div>
  <div id="popupHeader">
    <span id="popupBrand">TDMAP.PRO.VN</span>
    <button id="popupClose" onclick="closePopup()">✕</button>
  </div>
  <div id="popupTitle">–</div>
  <div id="popupCoords">–</div>
  <div class="btn-row">
    <a id="btnHSQ" class="btn-hsq" href="#" target="_blank" rel="noopener">
      <span class="ico">📁</span> Hồ sơ HSQ
    </a>
    <a id="btnMaps" class="btn-maps" href="#" target="_blank" rel="noopener">
      <span class="ico">🧭</span> Chỉ đường
    </a>
  </div>
</div>

<div id="dropOverlay"><p>📂<br>Thả file KML vào đây</p></div>

<button id="locateBtn" title="Vị trí của tôi" onclick="locateMe()">📍</button>

<div id="customAlertOverlay">
  <div id="customAlertBox">
    <div id="customAlertHeader">TDMAP.PRO.VN</div>
    <div id="customAlertBody"></div>
    <div id="customAlertFooter">
      <button id="customAlertBtn" onclick="closeAlert()">OK</button>
    </div>
  </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── ALERT CUSTOM FUNCTION ─────────────────────────────────────────────────────
function showAlert(message) {
  document.getElementById('customAlertBody').textContent = message;
  document.getElementById('customAlertOverlay').classList.add('show');
}
function closeAlert() {
  document.getElementById('customAlertOverlay').classList.remove('show');
}

// ── LOCATE ───────────────────────────────────────────────────────────────────
let locateMarker = null;
let locateCircle = null;

function locateMe() {
  if (!navigator.geolocation) {
    showStatus('Trình duyệt không hỗ trợ định vị');
    return;
  }
  const btn = document.getElementById('locateBtn');
  btn.classList.add('locating');
  btn.textContent = '⌛';
  showStatus('Đang xác định vị trí…');

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const acc = pos.coords.accuracy;

      if (locateMarker) map.removeLayer(locateMarker);
      if (locateCircle) map.removeLayer(locateCircle);

      locateCircle = L.circle([lat, lon], {
        radius: acc, color: '#1a6fd4', weight: 1,
        fillColor: '#1a6fd4', fillOpacity: 0.12, interactive: false
      }).addTo(map);

      locateMarker = L.marker([lat, lon], {
        icon: L.divIcon({
          className: '',
          html: `<div style="
            width:16px;height:16px;border-radius:50%;
            background:#1a6fd4;border:3px solid #fff;
            box-shadow:0 0 0 3px rgba(26,111,212,.4);
          "></div>`,
          iconSize:[16,16], iconAnchor:[8,8]
        }),
        interactive: false, zIndexOffset: 1000
      }).addTo(map);

      map.flyTo([lat, lon], 17, { duration: 1.2 });

      btn.classList.remove('locating');
      btn.classList.add('located');
      btn.textContent = '🔵';
      showStatus(`Vị trí của bạn · độ chính xác ±${Math.round(acc)}m`);
    },
    err => {
      btn.classList.remove('locating');
      btn.textContent = '📍';
      const msgs = {1:'Bị từ chối quyền định vị', 2:'Không xác định được vị trí', 3:'Hết thời gian chờ'};
      showStatus(msgs[err.code] || 'Lỗi định vị');
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
  );
}

// ── MAP ───────────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false, attributionControl: false });
L.tileLayer('https://mt{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
  { subdomains:'0123', maxZoom:22 }).addTo(map);

L.control.attribution({ position:'bottomright', prefix:'' })
  .addAttribution('© Google · TDMAP.PRO.VN').addTo(map);

L.control.zoom({ position:'bottomright' }).addTo(map);

const LocateControl = L.Control.extend({
  options: { position: 'bottomright' },
  onAdd: function() {
    const btn = document.getElementById('locateBtn');
    L.DomEvent.disableClickPropagation(btn);
    return btn;
  }
});
map.addControl(new LocateControl());

map.setView([12.7, 108.2], 13);

// ── STATE ─────────────────────────────────────────────────────────────────────
let allParcels = [];
let allLayers  = [];
let activeP    = null;

// ── KML PARSER ────────────────────────────────────────────────────────────────
function parseKML(xml) {
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  const pms = Array.from(doc.querySelectorAll('Placemark'));
  const byId = {};

  pms.forEach(pm => {
    const name = (pm.querySelector('name')||{}).textContent||'';
    const idM = name.trim().match(/^(\d+[-–]\d+)/);
    const id  = idM ? idM[1].replace('–','-') : null;
    if (!id) return;

    if (!byId[id]) byId[id] = { id, lat:null, lon:null, linkHSQ:'', rings:[] };
    const p = byId[id];

    pm.querySelectorAll('Polygon outerBoundaryIs LinearRing coordinates').forEach(el => {
      const pts = el.textContent.trim().split(/\s+/).map(s => {
        const [lo, la] = s.split(',').map(Number);
        return (!isNaN(la) && !isNaN(lo)) ? [la, lo] : null;
      }).filter(Boolean);
      if (pts.length > 2) p.rings.push(pts);
    });

    const ptEl = pm.querySelector('Point coordinates');
    if (ptEl) {
      const [lo, la] = ptEl.textContent.trim().split(',').map(Number);
      if (!isNaN(la)) { p.lat = la; p.lon = lo; }
      const desc = (pm.querySelector('description')||{}).textContent||'';
      const m = (name+' '+desc).match(/https?:\/\/drive\.google\.com\S+/);
      if (m && !p.linkHSQ) p.linkHSQ = m[0].replace(/&/g,'&');
    }
  });

  Object.values(byId).forEach(p => {
    if (!p.lat && p.rings.length) {
      const r = p.rings[0];
      p.lat = r.reduce((s,c)=>s+c[0],0)/r.length;
      p.lon = r.reduce((s,c)=>s+c[1],0)/r.length;
    }
  });

  return Object.values(byId).filter(p => p.rings.length > 0 || p.lat)
    .sort((a,b) => {
      const [aT,aU] = a.id.split('-').map(Number);
      const [bT,bU] = b.id.split('-').map(Number);
      return aT!==bT ? aT-bT : aU-bU;
    });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderParcels(list) {
  allLayers.forEach(l => map.removeLayer(l));
  allLayers = [];
  const bounds = [];

  list.forEach(p => {
    if (!p.rings.length) return;

    const poly = L.polygon(p.rings, {
      color: '#ffff00', weight: 2.5,
      fillColor: '#ffff00', fillOpacity: 0.06,
      interactive: true, bubblingMouseEvents: false
    }).addTo(map);

    poly.on('click tap', () => openPopup(p));
    bounds.push(...p.rings.flat());

    const dot = L.circleMarker([p.lat, p.lon], {
      radius: 5, color: '#fff', weight: 1.5,
      fillColor: '#1a6fd4', fillOpacity: 1,
      interactive: true, bubblingMouseEvents: false
    }).addTo(map);
    dot.on('click tap', () => openPopup(p));

    const lbl = L.tooltip({
      permanent: true, direction: 'center',
      className: 'lbl-style', offset: [0, 0]
    }).setContent(p.id);

    function updateLabel() {
      if (map.getZoom() >= 15) poly.bindTooltip(lbl);
      else poly.unbindTooltip();
    }
    map.on('zoomend', updateLabel);
    updateLabel();

    allLayers.push(poly, dot);
    p._poly = poly;
    p._dot  = dot;
  });

  if (bounds.length) map.fitBounds(bounds, { padding: [60,60], maxZoom: 17 });
}

// ── POPUP BẢN ĐỒ ──────────────────────────────────────────────────────────────
function openPopup(p) {
  if (activeP && activeP._poly)
    activeP._poly.setStyle({ color:'#ffff00', weight:2.5, fillOpacity:0.06 });

  activeP = p;
  if (p._poly) p._poly.setStyle({ color:'#00ffcc', weight:3.5, fillOpacity:0.2 });

  document.getElementById('searchInput').value = p.id;

  document.getElementById('popupTitle').textContent  = 'Tờ-Thửa ' + p.id;
  document.getElementById('popupCoords').textContent =
    `${(p.lat||0).toFixed(7)}, ${(p.lon||0).toFixed(7)}`;

  const mapsURL = `https://www.google.com/maps?q=${p.lat},${p.lon}`;
  document.getElementById('btnMaps').href = mapsURL;

  const btnHSQ = document.getElementById('btnHSQ');
  if (p.linkHSQ) {
    btnHSQ.href = p.linkHSQ;
    btnHSQ.classList.remove('disabled');
  } else {
    btnHSQ.href = '#';
    btnHSQ.classList.add('disabled');
  }

  document.getElementById('popup').classList.add('open');
  
  if (p._poly && p.rings.length > 0) {
    map.fitBounds(p._poly.getBounds(), { maxZoom: 19, animate: true, duration: 0.6 });
  } else if (p.lat) {
    map.flyTo([p.lat, p.lon], 19, { animate: true, duration: 0.6 });
  }
}

function closePopup() {
  document.getElementById('popup').classList.remove('open');
  if (activeP && activeP._poly)
    activeP._poly.setStyle({ color:'#ffff00', weight:2.5, fillOpacity:0.06 });
  activeP = null;
}

map.on('click', e => {
  if (!e.originalEvent._handled) closePopup();
});

// ── SEARCH LOGIC ──────────────────────────────────────────────────────────────

function onInputSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) {
    allParcels.forEach(p => {
      if (p._poly) p._poly.setStyle({ color:'#ffff00', fillOpacity:0.06 });
      if (p._dot)  p._dot.setStyle({ fillColor:'#1a6fd4', fillOpacity:1 });
    });
    return;
  }
  allParcels.forEach(p => {
    const isPartial = p.id.toLowerCase().includes(q);
    if (p._poly) {
      p._poly.setStyle({ color: isPartial ? '#00ffcc' : '#ffff0033', fillOpacity: isPartial ? 0.2 : 0.02 });
    }
    if (p._dot) {
      p._dot.setStyle({ fillColor: isPartial ? '#00c6a7' : '#1a6fd4', fillOpacity: isPartial ? 1 : 0.2 });
    }
  });
}

function executeSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  
  // Kiểm tra xem đã load dữ liệu chưa
  if (allParcels.length === 0) {
    showAlert("Bạn chưa tải dữ liệu KML lên bản đồ.\nVui lòng nhấn nút 'Mở KML' để tải dữ liệu trước khi tìm kiếm!");
    return;
  }

  if (!q) {
    showStatus('Vui lòng nhập Tờ-Thửa để tìm');
    return;
  }

  let exactHit = null;
  let partialHit = null;
  
  allParcels.forEach(p => {
    const parcelId = p.id.toLowerCase();
    if (parcelId === q && !exactHit) exactHit = p;
    if (parcelId.includes(q) && !partialHit) partialHit = p;
  });

  const target = exactHit || partialHit; 

  if (target) {
    openPopup(target);
    showStatus('Đã tìm thấy: ' + target.id);
  } else {
    // Gọi hộp thoại Custom Alert mới
    showAlert(`Không tìm thấy dữ liệu Tờ-Thửa: "${q.toUpperCase()}"\n\nVui lòng kiểm tra lại số liệu bạn vừa nhập.`);
    showStatus(`Không có dữ liệu: ${q}`);
  }
}

// ── FILE ──────────────────────────────────────────────────────────────────────
function handleFile(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    allParcels = parseKML(e.target.result);
    renderParcels(allParcels);
    document.getElementById('splash').style.display = 'none';
    document.getElementById('logoWrap').style.display = 'block';
    showStatus(`✓ ${allParcels.length} thửa – ${file.name}`);
  };
  r.readAsText(file, 'UTF-8');
}

// ── STATUS ────────────────────────────────────────────────────────────────────
let sTimer;
function showStatus(msg) {
  const el = document.getElementById('statusPill');
  el.textContent = msg; el.style.opacity = '1';
  clearTimeout(sTimer);
  sTimer = setTimeout(() => el.style.opacity='0', 3500);
}

// ── DRAG & DROP ───────────────────────────────────────────────────────────────
document.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('dropOverlay').classList.add('show'); });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) document.getElementById('dropOverlay').classList.remove('show'); });
document.addEventListener('drop', e => {
  e.preventDefault(); document.getElementById('dropOverlay').classList.remove('show');
  const f = e.dataTransfer.files[0]; if (f) handleFile(f);
});
